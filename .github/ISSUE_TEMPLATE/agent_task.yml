# Modified for LAN Party Hub; see CHANGES.md and NOTICE.md.
name: Agent-ready task
description: Small, testable task suitable for AI coding agents
title: "[agent] "
labels: ["agent-ready"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for focused tasks that can be completed and verified by a human developer or an AI coding agent.

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be changed?
      placeholder: Describe the desired behavior or improvement in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add relevant background, links, screenshots, or existing behavior.
    validations:
      required: false

  - type: textarea
    id: relevant-files
    attributes:
      label: Writable paths
      description: List the only files or folders the assigned agent may modify.
      placeholder: |
        games/<assigned-game>/**
    validations:
      required: true

  - type: textarea
    id: forbidden-files
    attributes:
      label: Forbidden paths
      description: List shared or concurrently owned paths that must remain read-only.
      value: |
        apps/**
        packages/**
        games/<other-game>/**
        generated registries and build output
    validations:
      required: true

  - type: textarea
    id: contract
    attributes:
      label: Existing contract
      description: State the manifest, input, public/private state, lifecycle, and package entrypoints this task must preserve.
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      value: |
        - Keep the server authoritative for gameplay rules, timers, scoring, and round transitions.
        - Keep controllers as input devices. Do not let controllers decide game outcomes.
        - Do not add static imports for optional game repos.
        - Keep changes small and reviewable.
        - Do not add assets or generated media unless their rights are clear.
        - Preserve LICENSE, NOTICE, source provenance, and modification notices; run `npm run legal:check`.
        - Request shared interface changes through the integration owner instead of editing shared packages from a game branch.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] The change is focused and easy to review.
        - [ ] `npm run typecheck` passes.
        - [ ] `npm run build` passes if runtime, bundling, shared packages, or release-facing behavior changed.
        - [ ] UI changes include screenshots, clips, or a short visual QA note.
        - [ ] `docs/project-status.md` is updated if functionality or limitations changed.
    validations:
      required: true

  - type: textarea
    id: suggested-verification
    attributes:
      label: Suggested verification
      value: |
        ```bash
        npm run games:list
        npm run games:sync-local
        npm run typecheck
        npm run build
        ```
    validations:
      required: false
